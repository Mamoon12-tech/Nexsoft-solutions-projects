<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteNest — Notes Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --paper: #f4f0e8;
      --ink: #1c1c1c;
      --muted: #8a8070;
      --accent: #c24b2a;
      --accent-light: rgba(194,75,42,0.08);
      --border: #e2ddd4;
      --yellow: #f59e0b;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --display: 'Fraunces', serif;
      --body: 'Inter', sans-serif;
    }

    body {
      background: var(--cream);
      font-family: var(--body);
      min-height: 100vh;
      color: var(--ink);
    }

    /* SIDEBAR */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--paper);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.2rem;
    }

    .brand span { color: var(--accent); font-style: italic; }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .new-btn {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: opacity 0.2s;
    }

    .new-btn:hover { opacity: 0.88; }

    .search-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
    }

    .sidebar-search {
      width: 100%;
      padding: 0.65rem 0.8rem 0.65rem 2.2rem;
      background: white;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: var(--body);
      font-size: 0.85rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .sidebar-search:focus { border-color: var(--accent); }
    .sidebar-search::placeholder { color: var(--muted); }

    .sidebar-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      padding-left: 0.2rem;
    }

    .notes-list { flex: 1; overflow-y: auto; }

    .note-item {
      padding: 0.85rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 0.3rem;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .note-item:hover { background: white; border-color: var(--border); }

    .note-item.active {
      background: white;
      border-color: var(--border);
      box-shadow: var(--shadow);
    }

    .note-item-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }

    .note-item-preview {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.3rem;
    }

    .note-date {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .note-color-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .empty-sidebar {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* MAIN */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .main-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--cream);
      flex-shrink: 0;
    }

    .toolbar-left { display: flex; align-items: center; gap: 0.75rem; }

    .color-picker {
      display: flex;
      gap: 0.4rem;
    }

    .color-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s;
    }

    .color-dot:hover, .color-dot.selected { transform: scale(1.2); border-color: var(--ink); }

    .toolbar-right { display: flex; gap: 0.5rem; }

    .tool-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      font-family: var(--body);
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tool-btn:hover { color: var(--ink); border-color: var(--ink); }

    .tool-btn.danger:hover { color: var(--accent); border-color: var(--accent); }

    /* EDITOR */
    .editor-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem;
    }

    .note-title-input {
      width: 100%;
      font-family: var(--display);
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--ink);
      border: none;
      background: transparent;
      outline: none;
      margin-bottom: 0.5rem;
      resize: none;
      line-height: 1.2;
    }

    .note-title-input::placeholder { color: #ccc; }

    .note-body-input {
      width: 100%;
      font-family: var(--body);
      font-size: 1rem;
      color: var(--ink);
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      line-height: 1.8;
      min-height: 60vh;
      font-weight: 300;
    }

    .note-body-input::placeholder { color: #ccc; }

    .word-count {
      font-size: 0.7rem;
      color: var(--muted);
      padding-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* WELCOME */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }

    .welcome-icon { font-size: 3rem; margin-bottom: 1rem; }

    .welcome h2 {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .welcome p { font-size: 0.9rem; line-height: 1.6; }

    /* COLOR ACCENT LINE */
    .accent-line {
      height: 3px;
      width: 100%;
      flex-shrink: 0;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: static; }
      .main { height: auto; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">Note<span>Nest</span></div>
    <div class="brand-sub">// Mamoon · Task 6</div>
    <button class="new-btn" onclick="newNote()">+ New Note</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="sidebar-search" id="searchInput" placeholder="Search notes..." oninput="renderList()"/>
    </div>
    <div class="sidebar-label">My Notes</div>
    <div class="notes-list" id="notesList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="accent-line" id="accentLine" style="background:#c24b2a"></div>
    <div class="main-toolbar">
      <div class="toolbar-left">
        <span style="font-size:0.8rem;color:var(--muted)">Color:</span>
        <div class="color-picker" id="colorPicker">
          <div class="color-dot selected" style="background:#c24b2a" data-color="#c24b2a" onclick="setColor('#c24b2a',this)"></div>
          <div class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="setColor('#f59e0b',this)"></div>
          <div class="color-dot" style="background:#10b981" data-color="#10b981" onclick="setColor('#10b981',this)"></div>
          <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="setColor('#3b82f6',this)"></div>
          <div class="color-dot" style="background:#8b5cf6" data-color="#8b5cf6" onclick="setColor('#8b5cf6',this)"></div>
        </div>
      </div>
      <div class="toolbar-right">
        <button class="tool-btn" onclick="saveNote()">💾 Save</button>
        <button class="tool-btn danger" onclick="deleteNote()">🗑 Delete</button>
      </div>
    </div>

    <div id="welcomeScreen" class="welcome">
      <div class="welcome-icon">📝</div>
      <h2>Your notes live here</h2>
      <p>Select a note from the sidebar<br>or create a new one to get started.</p>
    </div>

    <div id="editorScreen" style="display:none;flex:1;overflow-y:auto;flex-direction:column">
      <div class="editor-wrap">
        <textarea class="note-title-input" id="noteTitle" placeholder="Note title..." rows="1" oninput="autoResize(this);updateWordCount()"></textarea>
        <div class="word-count" id="wordCount">0 words</div>
        <textarea class="note-body-input" id="noteBody" placeholder="Start writing..." oninput="updateWordCount()"></textarea>
      </div>
    </div>
  </main>
</div>

<script>
  let notes = JSON.parse(localStorage.getItem('nexsoft_notes') || '[]');
  let activeId = null;

  function save() {
    localStorage.setItem('nexsoft_notes', JSON.stringify(notes));
  }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function newNote() {
    const note = {
      id: genId(),
      title: '',
      body: '',
      color: '#c24b2a',
      updatedAt: Date.now()
    };
    notes.unshift(note);
    save();
    openNote(note.id);
    renderList();
    document.getElementById('noteTitle').focus();
  }

  function openNote(id) {
    activeId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;

    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('editorScreen').style.display = 'flex';
    document.getElementById('noteTitle').value = note.title;
    document.getElementById('noteBody').value = note.body;
    document.getElementById('accentLine').style.background = note.color;

    document.querySelectorAll('.color-dot').forEach(d => {
      d.classList.toggle('selected', d.dataset.color === note.color);
    });

    updateWordCount();
    renderList();
  }

  function saveNote() {
    if (!activeId) return;
    const idx = notes.findIndex(n => n.id === activeId);
    if (idx === -1) return;
    notes[idx].title = document.getElementById('noteTitle').value || 'Untitled';
    notes[idx].body = document.getElementById('noteBody').value;
    notes[idx].updatedAt = Date.now();
    // Move to top
    const note = notes.splice(idx, 1)[0];
    notes.unshift(note);
    save();
    renderList();
  }

  function deleteNote() {
    if (!activeId) return;
    if (!confirm('Delete this note?')) return;
    notes = notes.filter(n => n.id !== activeId);
    activeId = null;
    save();
    document.getElementById('welcomeScreen').style.display = 'flex';
    document.getElementById('editorScreen').style.display = 'none';
    renderList();
  }

  function setColor(color, el) {
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    if (note) { note.color = color; save(); }
    document.getElementById('accentLine').style.background = color;
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    renderList();
  }

  function updateWordCount() {
    const body = document.getElementById('noteBody').value;
    const words = body.trim() ? body.trim().split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function renderList() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('notesList');

    let filtered = notes.filter(n =>
      n.title.toLowerCase().includes(query) ||
      n.body.toLowerCase().includes(query)
    );

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-sidebar">${query ? 'No notes match your search.' : 'No notes yet.<br>Create your first one!'}</div>`;
      return;
    }

    el.innerHTML = filtered.map(n => `
      <div class="note-item ${n.id === activeId ? 'active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-item-title">${escHtml(n.title || 'Untitled')}</div>
        <div class="note-item-preview">${escHtml(n.body.slice(0, 50)) || 'No content'}</div>
        <div class="note-item-meta">
          <span class="note-date">${formatDate(n.updatedAt)}</span>
          <span class="note-color-dot" style="background:${n.color}"></span>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Auto-save every 10s
  setInterval(() => { if (activeId) saveNote(); }, 10000);

  // Keyboard shortcut
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveNote(); }
  });

  renderList();
</script>
</body>
</html>
