<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calc — Calculator App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d12;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      padding: 1rem;
    }

    .calc-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    .calc {
      width: 320px;
      background: #13131f;
      border-radius: 20px;
      border: 1px solid #1e1e32;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    }

    /* DISPLAY */
    .display {
      padding: 1.5rem 1.5rem 1rem;
      text-align: right;
      background: #0d0d12;
      border-bottom: 1px solid #1a1a28;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display-expr {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: #444;
      min-height: 1.2em;
      word-break: break-all;
      margin-bottom: 0.3rem;
    }

    .display-main {
      font-family: 'Space Mono', monospace;
      font-size: 2.4rem;
      font-weight: 700;
      color: #f0eee8;
      word-break: break-all;
      line-height: 1.1;
      transition: color 0.15s;
    }

    .display-main.error { color: #ef4444; font-size: 1.4rem; }

    /* BUTTONS */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1a1a28;
      padding: 1px;
    }

    .btn {
      padding: 1.1rem 0.5rem;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
      user-select: none;
    }

    .btn:active { transform: scale(0.93); }

    .btn-num {
      background: #1c1c2e;
      color: #e2e8f0;
    }

    .btn-num:hover { background: #24243a; }

    .btn-op {
      background: #1a1a30;
      color: #818cf8;
      font-size: 1.15rem;
    }

    .btn-op:hover { background: rgba(129,140,248,0.15); }

    .btn-eq {
      background: #6c47ff;
      color: white;
      font-size: 1.3rem;
    }

    .btn-eq:hover { background: #7c5fff; }

    .btn-clear {
      background: #1c1c2e;
      color: #ef4444;
      font-size: 0.9rem;
    }

    .btn-clear:hover { background: rgba(239,68,68,0.15); }

    .btn-fn {
      background: #1a1a2e;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    .btn-fn:hover { background: #22223a; }

    .btn-zero { grid-column: span 2; }

    .btn-eq-wide { }

    /* HISTORY */
    .history-wrap {
      margin-top: 1.2rem;
      width: 320px;
    }

    .history-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #333;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .history-list {
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      background: #13131f;
      border: 1px solid #1e1e32;
      border-radius: 6px;
      color: #555;
      cursor: pointer;
      transition: color 0.2s;
    }

    .history-item:hover { color: #888; }
    .history-item .res { color: #6c47ff; }
  </style>
</head>
<body>

<div class="calc-label">// Mamoon's Calculator — Task 4</div>

<div class="calc">
  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-main" id="main">0</div>
  </div>
  <div class="btn-grid">
    <button class="btn btn-clear" onclick="clearAll()">AC</button>
    <button class="btn btn-fn" onclick="toggleSign()">+/−</button>
    <button class="btn btn-fn" onclick="percent()">%</button>
    <button class="btn btn-op" onclick="setOp('/')">÷</button>

    <button class="btn btn-num" onclick="input('7')">7</button>
    <button class="btn btn-num" onclick="input('8')">8</button>
    <button class="btn btn-num" onclick="input('9')">9</button>
    <button class="btn btn-op" onclick="setOp('*')">×</button>

    <button class="btn btn-num" onclick="input('4')">4</button>
    <button class="btn btn-num" onclick="input('5')">5</button>
    <button class="btn btn-num" onclick="input('6')">6</button>
    <button class="btn btn-op" onclick="setOp('-')">−</button>

    <button class="btn btn-num" onclick="input('1')">1</button>
    <button class="btn btn-num" onclick="input('2')">2</button>
    <button class="btn btn-num" onclick="input('3')">3</button>
    <button class="btn btn-op" onclick="setOp('+')">+</button>

    <button class="btn btn-num btn-zero" onclick="input('0')">0</button>
    <button class="btn btn-num" onclick="inputDot()">.</button>
    <button class="btn btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<div class="history-wrap">
  <div class="history-label">// History</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  let current = '0';
  let prev = '';
  let op = null;
  let justCalc = false;
  let history = [];

  const mainEl = document.getElementById('main');
  const exprEl = document.getElementById('expr');

  function updateDisplay() {
    mainEl.textContent = current.length > 10 ? parseFloat(current).toPrecision(8) : current;
    mainEl.classList.remove('error');
  }

  function input(val) {
    if (justCalc) { current = val; justCalc = false; }
    else if (current === '0') current = val;
    else if (current.length < 12) current += val;
    updateDisplay();
  }

  function inputDot() {
    if (justCalc) { current = '0.'; justCalc = false; return; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function setOp(o) {
    if (op && !justCalc) calculate(true);
    prev = current;
    op = o;
    justCalc = true;
    const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    exprEl.textContent = `${prev} ${symbols[o]}`;
  }

  function calculate(silent = false) {
    if (!op || !prev) return;
    const a = parseFloat(prev);
    const b = parseFloat(current);
    let result;

    if (op === '/' && b === 0) {
      mainEl.textContent = 'Cannot ÷ 0';
      mainEl.classList.add('error');
      exprEl.textContent = '';
      op = null; prev = ''; current = '0';
      return;
    }

    switch(op) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/': result = a / b; break;
    }

    const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    const expr = `${a} ${symbols[op]} ${b}`;
    const res = parseFloat(result.toPrecision(10)).toString();

    if (!silent) {
      exprEl.textContent = `${expr} =`;
      addHistory(expr, res);
    }

    current = res;
    prev = '';
    op = null;
    justCalc = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; prev = ''; op = null; justCalc = false;
    exprEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current === '0') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    current = (parseFloat(current) / 100).toString();
    updateDisplay();
  }

  function addHistory(expr, res) {
    history.unshift({ expr, res });
    if (history.length > 8) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const el = document.getElementById('historyList');
    if (!history.length) { el.innerHTML = ''; return; }
    el.innerHTML = history.map(h => `
      <div class="history-item" onclick="useHistory('${h.res}')">
        <span>${h.expr}</span>
        <span class="res">= ${h.res}</span>
      </div>`).join('');
  }

  function useHistory(val) {
    current = val;
    justCalc = true;
    updateDisplay();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
